<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibo de Parqueadero</title>
</head>
<body style="margin: 0; padding: 20px; background-color: #667eea; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center" style="padding: 20px 0;">

                <!-- Email container -->
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"
                    style="max-width: 600px; width: 100%; background-color: #ffffff; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden;">

                    <!-- HEADER -->
                    <tr>
                        <td style="background-color: #3128a7; padding: 40px 30px; text-align: center;">
                            <h1 style="margin: 0; font-size: 28px; font-weight: 600; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                            Hola {{ visitor_name }}, tu reserva #{{ reservation_id }} ha sido confirmada.
                            </h1>
                            <p style="color: #ffffff; margin: 10px 0 0 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                                Fontibon Reservado te da la bienvenida ¡Disfruta tu visita!
                            </p>
                        </td>
                    </tr>

                    <!-- FOOTER -->
                    <tr>
                        <td style="background-color: #f8f9fa; padding: 30px; text-align: center; border-top: 1px solid #eeeeee;">
                          
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>

</body>
</html>
